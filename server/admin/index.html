<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ismart Skills CRM</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #0f2744;
      --muted: #64748b;
      --brand: #004890;
      --accent: #ff9e0d;
      --border: #dbe4f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(15, 39, 68, 0.06);
    }
    h1 { margin: 0 0 8px; font-size: 1.75rem; }
    .sub { color: var(--muted); margin-bottom: 24px; }
    .login, .toolbar, .stats { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    input, select, textarea, button {
      font: inherit;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 10px 12px;
    }
    button {
      background: var(--brand);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button.secondary { background: white; color: var(--brand); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
    th { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: #eef4ff;
      color: var(--brand);
    }
    .badge.new { background: #fff4df; color: #9a6200; }
    .badge.contacted { background: #e8f7ff; color: #0369a1; }
    .badge.qualified { background: #ecfdf3; color: #047857; }
    .badge.closed { background: #f1f5f9; color: #475569; }
    .badge.spam { background: #fef2f2; color: #b91c1c; }
    .hidden { display: none; }
    .error { color: #b91c1c; margin-top: 12px; }
    .stat {
      flex: 1;
      min-width: 140px;
      background: #f8fbff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }
    .stat strong { display: block; font-size: 1.5rem; margin-top: 4px; }
    textarea.notes { width: 100%; min-height: 70px; resize: vertical; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    @media (max-width: 900px) {
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr { margin-bottom: 16px; border: 1px solid var(--border); border-radius: 12px; padding: 8px; }
      td { border: none; padding: 8px 12px; }
      td::before {
        content: attr(data-label);
        display: block;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="loginView" class="card">
      <h1>Ismart Skills CRM</h1>
      <p class="sub">Sign in with your admin password to manage website leads.</p>
      <div class="login">
        <input id="passwordInput" type="password" placeholder="Admin password" style="min-width: 280px;" />
        <button id="loginBtn" type="button">Sign In</button>
      </div>
      <p id="loginError" class="error hidden"></p>
    </div>

    <div id="crmView" class="hidden">
      <div class="card" style="margin-bottom: 16px;">
        <div style="display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; align-items:center;">
          <div>
            <h1>Lead CRM</h1>
            <p class="sub" style="margin:0;">All enquiries from the website are captured here.</p>
          </div>
          <button id="logoutBtn" class="secondary" type="button">Sign Out</button>
        </div>
        <div class="stats" id="stats"></div>
      </div>

      <div class="card">
        <div class="toolbar">
          <input id="searchInput" type="search" placeholder="Search name, email, programme..." style="min-width:240px;" />
          <select id="statusFilter">
            <option value="">All statuses</option>
            <option value="new">New</option>
            <option value="contacted">Contacted</option>
            <option value="qualified">Qualified</option>
            <option value="closed">Closed</option>
            <option value="spam">Spam</option>
          </select>
          <select id="sourceFilter">
            <option value="">All sources</option>
            <option value="homepage_enquiry">Homepage enquiry</option>
            <option value="contact">Contact page</option>
            <option value="newsletter">Newsletter</option>
            <option value="brochure_download">Brochure download</option>
          </select>
          <button id="refreshBtn" type="button">Refresh</button>
        </div>
        <p id="crmError" class="error hidden"></p>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Source</th>
                <th>Contact</th>
                <th>Details</th>
                <th>Status</th>
                <th>Notes</th>
              </tr>
            </thead>
            <tbody id="leadsBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TOKEN_KEY = "ismart_crm_token";

    const loginView = document.getElementById("loginView");
    const crmView = document.getElementById("crmView");
    const loginError = document.getElementById("loginError");
    const crmError = document.getElementById("crmError");
    const leadsBody = document.getElementById("leadsBody");
    const stats = document.getElementById("stats");

    function token() {
      return sessionStorage.getItem(TOKEN_KEY);
    }

    function authHeaders() {
      return {
        Authorization: `Bearer ${token()}`,
        "Content-Type": "application/json",
      };
    }

    function showLogin() {
      loginView.classList.remove("hidden");
      crmView.classList.add("hidden");
    }

    function showCrm() {
      loginView.classList.add("hidden");
      crmView.classList.remove("hidden");
    }

    function formatDate(value) {
      return new Date(value).toLocaleString("en-GB", {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function sourceLabel(source) {
      return ({
        homepage_enquiry: "Homepage",
        contact: "Contact",
        newsletter: "Newsletter",
        brochure_download: "Brochure",
      })[source] || source;
    }

    async function loadLeads() {
      crmError.classList.add("hidden");
      const params = new URLSearchParams();
      const status = document.getElementById("statusFilter").value;
      const source = document.getElementById("sourceFilter").value;
      const q = document.getElementById("searchInput").value.trim();
      if (status) params.set("status", status);
      if (source) params.set("source", source);
      if (q) params.set("q", q);

      const res = await fetch(`/api/admin/leads?${params}`, {
        headers: authHeaders(),
      });

      if (res.status === 401) {
        sessionStorage.removeItem(TOKEN_KEY);
        showLogin();
        return;
      }

      const data = await res.json();
      if (!res.ok) {
        crmError.textContent = data.error || "Failed to load leads.";
        crmError.classList.remove("hidden");
        return;
      }

      renderStats(data.leads);
      renderLeads(data.leads);
    }

    function renderStats(leads) {
      const counts = { total: leads.length, new: 0, contacted: 0, qualified: 0 };
      for (const lead of leads) {
        if (counts[lead.status] !== undefined) counts[lead.status] += 1;
      }

      stats.innerHTML = `
        <div class="stat"><span>Total shown</span><strong>${counts.total}</strong></div>
        <div class="stat"><span>New</span><strong>${counts.new}</strong></div>
        <div class="stat"><span>Contacted</span><strong>${counts.contacted}</strong></div>
        <div class="stat"><span>Qualified</span><strong>${counts.qualified}</strong></div>
      `;
    }

    function renderLeads(leads) {
      leadsBody.innerHTML = leads.map((lead) => `
        <tr data-id="${lead.id}">
          <td data-label="Date">${formatDate(lead.created_at)}</td>
          <td data-label="Source"><span class="badge">${sourceLabel(lead.source)}</span></td>
          <td data-label="Contact">
            <strong>${escapeHtml(lead.name)}</strong><br />
            <a href="mailto:${escapeHtml(lead.email)}">${escapeHtml(lead.email)}</a><br />
            ${lead.phone ? escapeHtml(lead.phone) : ""}
          </td>
          <td data-label="Details">
            ${lead.enquiry_type ? `<div><strong>Type:</strong> ${escapeHtml(lead.enquiry_type)}</div>` : ""}
            ${lead.programme ? `<div><strong>Programme:</strong> ${escapeHtml(lead.programme)}</div>` : ""}
            ${lead.course_slug ? `<div><strong>Course:</strong> ${escapeHtml(lead.course_slug)}</div>` : ""}
            ${lead.message ? `<div style="margin-top:8px;">${escapeHtml(lead.message)}</div>` : ""}
            ${lead.page_url ? `<div style="margin-top:8px;"><a href="${escapeHtml(lead.page_url)}" target="_blank" rel="noopener">View page</a></div>` : ""}
          </td>
          <td data-label="Status">
            <select class="status-select" data-id="${lead.id}">
              ${["new","contacted","qualified","closed","spam"].map((status) =>
                `<option value="${status}" ${lead.status === status ? "selected" : ""}>${status}</option>`
              ).join("")}
            </select>
          </td>
          <td data-label="Notes">
            <textarea class="notes" data-id="${lead.id}">${escapeHtml(lead.notes || "")}</textarea>
            <div class="actions" style="margin-top:8px;">
              <button type="button" class="save-btn" data-id="${lead.id}">Save</button>
            </div>
          </td>
        </tr>
      `).join("");

      leadsBody.querySelectorAll(".save-btn").forEach((btn) => {
        btn.addEventListener("click", () => saveLead(btn.dataset.id));
      });
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    async function saveLead(id) {
      const row = leadsBody.querySelector(`tr[data-id="${id}"]`);
      const status = row.querySelector(".status-select").value;
      const notes = row.querySelector(".notes").value;

      const res = await fetch(`/api/admin/leads/${id}`, {
        method: "PATCH",
        headers: authHeaders(),
        body: JSON.stringify({ status, notes }),
      });

      if (!res.ok) {
        const data = await res.json();
        crmError.textContent = data.error || "Failed to save lead.";
        crmError.classList.remove("hidden");
        return;
      }

      await loadLeads();
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      loginError.classList.add("hidden");
      const password = document.getElementById("passwordInput").value;
      sessionStorage.setItem(TOKEN_KEY, password);

      const res = await fetch("/api/admin/leads?limit=1", {
        headers: authHeaders(),
      });

      if (res.status === 401) {
        sessionStorage.removeItem(TOKEN_KEY);
        loginError.textContent = "Invalid admin password.";
        loginError.classList.remove("hidden");
        return;
      }

      showCrm();
      await loadLeads();
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      sessionStorage.removeItem(TOKEN_KEY);
      showLogin();
    });

    document.getElementById("refreshBtn").addEventListener("click", loadLeads);
    document.getElementById("statusFilter").addEventListener("change", loadLeads);
    document.getElementById("sourceFilter").addEventListener("change", loadLeads);
    document.getElementById("searchInput").addEventListener("input", () => {
      clearTimeout(window.__crmSearchTimer);
      window.__crmSearchTimer = setTimeout(loadLeads, 300);
    });

    if (token()) {
      showCrm();
      loadLeads();
    } else {
      showLogin();
    }
  </script>
</body>
</html>
